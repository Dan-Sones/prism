services:
  postgres:
    image: postgres:18.1
    container_name: prism_postgres
    env_file:
      - .env
    volumes:
      - postgres_data_test:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  flyway:
    image: flyway/flyway:11.20-alpine
    container_name: prism_flyway
    command: migrate
    volumes:
      - ../../infrastructure/postgres-migrations:/flyway/sql
    environment:
      FLYWAY_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
      FLYWAY_BASELINE_ON_MIGRATE: "true"
      FLYWAY_CLEAN_DISABLED: "false"
      FLYWAY_SCHEMAS: public,prism
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  assignment-cache:
    image: redis:8.4-alpine
    restart: always
    command: redis-server --save 20 1 --loglevel warning --requirepass ${REDIS_PASSWORD}
    volumes:
      - assignment-cache-test:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - ../../infrastructure/kafka/kafka-init.sh:/kafka-init.sh
    entrypoint:
      [
        "/bin/bash",
        "-c",
        "/etc/confluent/docker/run & sleep 10 && bash /kafka-init.sh && wait",
      ]

  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    container_name: clickhouse-server
    volumes:
      - clickhouse_data_test:/var/lib/clickhouse
      - ../../infrastructure/clickhouse-config/config.xml:/etc/clickhouse-server/config.d/docker.xml
      - ../../infrastructure/clickhouse-config/users.xml:/etc/clickhouse-server/users.d/docker.xml
      - ../../infrastructure/clickhouse-migrations/init.sql:/docker-entrypoint-initdb.d/init.sql

    environment:
      CLICKHOUSE_DB: prism_events
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  experimentation-service:
    image: ghcr.io/dan-sones/prism-experimentation-service:latest
    platform: linux/amd64
    container_name: prism_experimentation_service
    ports:
      - "${EXPERIMENTATION_SERVICE_HTTP_PORT}:${EXPERIMENTATION_SERVICE_HTTP_PORT}"
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      EXPERIMENTATION_SERVICE_GRPC_SERVER_ADDRESS: 0.0.0.0
      KAFKA_BOOTSTRAP_SERVER_HOST: kafka
      KAFKA_BOOTSTRAP_SERVER_PORT: 29092
      CLICKHOUSE_HOST: clickhouse
      STATS_ENGINE_GRPC_SERVER_ADDRESS: stats-engine
    depends_on:
      flyway:
        condition: service_completed_successfully
      kafka:
        condition: service_started

  assignment-service:
    image: ghcr.io/dan-sones/prism-assignment-service:latest
    platform: linux/amd64
    container_name: prism_assignment_service
    ports:
      - "${ASSIGNMENT_SERVICE_HTTP_PORT}:${ASSIGNMENT_SERVICE_HTTP_PORT}"
    env_file:
      - .env
    environment:
      REDIS_HOST: assignment-cache
      KAFKA_BOOTSTRAP_SERVER_HOST: kafka
      KAFKA_BOOTSTRAP_SERVER_PORT: 29092
      EXPERIMENTATION_SERVICE_GRPC_SERVER_ADDRESS: experimentation-service
      ASSIGNMENT_SERVICE_GRPC_SERVER_ADDRESS: 0.0.0.0
    depends_on:
      experimentation-service:
        condition: service_started
      assignment-cache:
        condition: service_started
      kafka:
        condition: service_started

  events-service:
    image: ghcr.io/dan-sones/prism-events-service:latest
    platform: linux/amd64
    container_name: prism_events_service
    ports:
      - "5678:5678"
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EXPERIMENTATION_SERVICE_GRPC_SERVER_ADDRESS: experimentation-service
    depends_on:
      experimentation-service:
        condition: service_started
      kafka:
        condition: service_started

  clickhouse-writer:
    image: ghcr.io/dan-sones/prism-clickhouse-writer:latest
    platform: linux/amd64
    container_name: prism_clickhouse_writer
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVER_HOST: kafka
      KAFKA_BOOTSTRAP_SERVER_PORT: 29092
      CLICKHOUSE_HOST: clickhouse
    depends_on:
      experimentation-service:
        condition: service_started
      kafka:
        condition: service_started

  stats-engine:
    image: ghcr.io/dan-sones/prism-stats-engine:latest
    platform: linux/amd64
    container_name: prism_stats_engine
    env_file:
      - .env

  experimentation-portal:
    image: ghcr.io/dan-sones/prism-experimentation-portal:latest
    platform: linux/amd64
    container_name: prism_experimentation_portal
    ports:
      - "${EXPERIMENTATION_PORTAL_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      API_BASE_URL: http://localhost:${EXPERIMENTATION_SERVICE_HTTP_PORT}/api
    depends_on:
      experimentation-service:
        condition: service_started

  data-cooking-service:
    image: ghcr.io/dan-sones/prism-data-cooking-service:latest
    platform: linux/amd64
    container_name: prism_data_cooking_service
    env_file:
      - .env
    environment:
      KAFKA_BOOTSTRAP_SERVER_HOST: kafka
      KAFKA_BOOTSTRAP_SERVER_PORT: 29092
      CLICKHOUSE_HOST: clickhouse
      EXPERIMENTATION_SERVICE_GRPC_SERVER_ADDRESS: experimentation-service
    depends_on:
      experimentation-service:
        condition: service_started
      kafka:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    container_name: prism_caddy
    profiles: ["tls"]
    ports:
      - "443:443"
    env_file:
      - .env
    volumes:
      - ../../infrastructure/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ${CADDY_CERT_DIR:-../../infrastructure/caddy/certs}:/certs:ro
    depends_on:
      - events-service
      - assignment-service

volumes:
  postgres_data_test:
  assignment-cache-test:
    driver: local
  clickhouse_data_test:
