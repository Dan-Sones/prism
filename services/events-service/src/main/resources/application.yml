spring:
  application:
    name: events-service
  threads:
    virtual:
      enabled: true



server:
  port: 5678


grpc:
    server:
        port: 50052
        host: localhost

kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  topic: ${KAFKA_EVENTS_TOPIC:events}

logging:
  level:
    root: WARN
    org.prism.eventsservice: WARN
