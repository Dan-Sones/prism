spring:
  application:
    name: events-service
  threads:
    virtual:
      enabled: true



server:
  port: ${EVENTS_SERVICE_SERVER_PORT:5678}


grpc:
    server:
        port: ${EXPERIMENTATION_SERVICE_GRPC_SERVER_PORT:50052}
        host: localhost

kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  topic: ${KAFKA_EVENTS_TOPIC:events}

logging:
  level:
    root: WARN
    org.prism.eventsservice: WARN
