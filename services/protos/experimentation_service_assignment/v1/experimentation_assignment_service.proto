syntax = "proto3";

import "google/protobuf/timestamp.proto";

package assignment.v1;
option go_package = "experimentation-service/internal/grpc/generated/experimentation_service_assignment/v1;experimentation_service_assignment";

service ExperimentationServiceAssignment {
  rpc GetExperimentsAndVariantsForBucketAtTime(GetExperimentsAndVariantsForBucketAtTimeRequest) returns (GetExperimentsAndVariantsForBucketAtTimeResponse);
}

message GetExperimentsAndVariantsForBucketAtTimeRequest {
  int32 bucket_id = 1;
  string requester = 2;
  google.protobuf.Timestamp timestamp = 3;
}

message VariantDetails {
  string variant_key = 1;
  int32 upper_bound = 2;
  optional int32 lower_bound = 3; // Optional is required for 0 values 
}

message ExperimentDetails {
  string experiment_key = 1;
  string unique_salt = 2;
  repeated VariantDetails variants = 3;
}

message GetExperimentsAndVariantsForBucketAtTimeResponse {
  repeated ExperimentDetails experiments = 1;
}
