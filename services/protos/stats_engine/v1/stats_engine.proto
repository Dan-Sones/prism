syntax = "proto3";

option go_package="experimentation-service/internal/grpc/generated/v1;stats_engine";

package stats_engine.v1;

service StatsEngine {
  rpc CalculateSampleSize(CalculateSampleSizeRequest) returns (CalculateSampleSizeResponse);
}

message CalculateSampleSizeRequest {
  repeated MetricDetails metrics = 1;
  double alpha = 2;
  double power = 3;
}

message MetricDetails {
  string metric_key = 1;
  double baseline = 2;
  bool is_binary = 3;
  double absolute_percentage_mde = 4;
  MetricDirection direction = 5;
}

enum MetricDirection {
  INCREASE = 0;
}

message CalculateSampleSizeResponse {
  int32 total = 1;
  repeated int32 per_variant = 2;
  repeated double split = 3;
}