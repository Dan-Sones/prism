syntax = "proto3";

option go_package="experimentation-service/internal/grpc/generated/v1;stats_engine";

package stats_engine.v1;

service StatsEngine {
  rpc CalculateSampleSizeForBinomialMetric (CalculateSampleSizeForBinomialMetricRequest) returns (CalculateSampleSizeForBinomialMetricResponse);
}

message CalculateSampleSizeForBinomialMetricRequest {
  double absolute_percentage_mde =1;
  int64 experiment_exposures = 2;
  int64 experiment_conversions = 3;
//  double alpha = 3; -- Going to hardcode these for now
//  double power = 4;
  int32 variant_count = 4;
}

message CalculateSampleSizeForBinomialMetricResponse {
  int32 total = 1;
  repeated int32 per_variant = 2;
  repeated double split = 3;
}