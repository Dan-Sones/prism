syntax = "proto3";

package assignment_service.v1;
option go_package = "assignment-service/server/api/proto/assignment_service/v1;assignment_service";

service AssignmentService {
  rpc GetExperimentsAndVariantsForUser(GetExperimentsAndVariantsForUserRequest) returns (GetExperimentsAndVariantsForUserResponse);
  rpc GetExperimentsAndVariantsForUsers(GetExperimentsAndVariantsForUsersRequest)
      returns (stream UserAssignments);
  rpc GetBucketForUser(GetBucketForUserRequest) returns (GetBucketForUserResponse);
  rpc GetVariantForUserFromExperimentDetails(GetVariantForUserFromExperimentDetailsRequest) returns (GetVariantForUserFromExperimentDetailsResponse);
}

message GetExperimentsAndVariantsForUserRequest {
  string user_id = 1;
}

message GetExperimentsAndVariantsForUsersRequest {
  repeated string user_ids = 1;
}

message GetExperimentsAndVariantsForUserResponse {
  map<string, string> assignments = 1;
}

message UserAssignments {
  string user_id = 1;
  map<string, string> assignments = 2;
}

message GetBucketForUserRequest {
  string user_id = 1;
}

message GetBucketForUserResponse {
  int32 bucket = 1;
}

message VariantDetails {
  string variant_key = 1;
  int32 upper_bound = 2;
  optional int32 lower_bound = 3; // Optional is required for 0 values
}

message ExperimentDetails {
  string experiment_key = 1;
  string unique_salt = 2;
  repeated VariantDetails variants = 3;
}

message GetVariantForUserFromExperimentDetailsRequest {
  string user_id = 1;
  ExperimentDetails experimentDetails = 2;
}

message GetVariantForUserFromExperimentDetailsResponse {
  string variant_key = 1;
}
