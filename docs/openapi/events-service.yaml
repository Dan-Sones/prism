openapi: 3.0.3
info:
  title: Events Service API
  version: "1.0.0"
servers:
  - url: http://localhost:8080

tags:
  - name: Events

paths:
  /event:
    post:
      tags:
        - Events
      summary: Ingest an event
      description: |
        Submits a single event for validation and downstream processing.

        Validation rules enforced on every request:
          - `event_key` must be present, non-empty, and map to a valid event_key from the schema
          - `user_details.id` must be present and non-empty.
          - `sent_at` must be present.
          - Every property defined on the catalog `EventType` must be present in `properties`.
          - `experiment_key` must be present and non-empty when `event_key == "experiment_exposure"` (We can't attribute exposure events retroactively).
      operationId: publishEvent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventRequest"
            examples:
              checkoutCompleted:
                summary: Fired when a purchase is made
                value:
                  event_key: checkout_completed
                  user_details:
                    id: a0f96898-cd8c-418f-a563-7182fb66a127
                  sent_at: "2026-06-19T14:22:08.512Z"
                  properties:
                    cart_total: 49.99
                    item_count: 3
                    currency: GBP
              experimentExposure:
                summary: An experiment exposure event
                value:
                  event_key: experiment_exposure
                  experiment_key: checkout_redesign
                  user_details:
                    id: a0f96898-cd8c-418f-a563-7182fb66a128
                  sent_at: "2026-06-19T14:22:08.512Z"
                  properties:
                    variant: treatment
      responses:
        "204":
          description: The event was validated and emitted. No response body is returned.
        "400":
          $ref: "problems.yaml#/responses/BadRequest"
        "500":
          $ref: "problems.yaml#/responses/InternalServerError"

components:
  schemas:
    UserDetails:
      type: object
      required:
        - id
      properties:
        id:
          type: string
          description: The user the event is associated with.
          example: user_8f3c2a91
    EventRequest:
      type: object
      required:
        - event_key
        - user_details
        - sent_at
        - properties
      properties:
        event_key:
          type: string
          description: |
            The identifier of the event type. Must match an event defined in
            the events catalog.
          example: checkout_completed
        user_details:
          $ref: "#/components/schemas/UserDetails"
        sent_at:
          type: string
          format: date-time
          description: ISO-8601 timestamp at which the event was emitted by the client.
          example: "2026-06-19T14:22:08.512Z"
        experiment_key:
          type: string
          description: |
            Identifies the experiment the exposure event relates to. Required
            only on `experiment_exposure` events.
          example: checkout_redesign
        properties:
          type: object
          description: |
            Event properties. Every property defined on the matching catalog
            `EventType` must be present.
          additionalProperties: true
          example:
            cart_total: 49.99
            item_count: 3
            currency: GBP
