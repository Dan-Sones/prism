experiment_1:
  duration_seconds: 60 # 10 Mins
  feature_flag_key: button_color_v1
  variant_keys:
    - button_blue
    - button_green
  events:
    experiment_exposure:
      fields:
        - feature_flag_key:
            type: string
      count_to_publish_for_variant:
        button_blue: 500
        button_green: 500
    purchase:
      fields:
        - order_total:
            type: float
            min: 10.0
            max: 500.0
      count_to_publish_for_variant:
        button_blue: 300
        button_green: 400



